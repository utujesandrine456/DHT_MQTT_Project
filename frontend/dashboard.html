<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Monitor — Temperature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --pure-white: #ffffff;
      --pure-black: #000000;

      /* Luxury styling defaults to a dark mode aesthetic, but uses purely black & white */
      --bg: var(--pure-black);
      --ink: var(--pure-white);
      --border: rgba(255, 255, 255, 0.12);
      --muted: rgba(255, 255, 255, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Elegant, sprawling container that looks like a high-end physical display console */
    main {
      width: 100%;
      max-width: 480px;
      padding: 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      position: relative;
    }

    /* Ultra-thin luxury accent frame lines */
    main::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      pointer-events: none;
    }

    /* Header System */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.25em;
    }

    .status-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-text {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      transition: color 0.3s ease;
    }

    /* Premium status dot: Pure White/Black high contrast instead of colors */
    .status-dot {
      width: 4px;
      height: 4px;
      background: var(--muted);
      border-radius: 50%;
      transition: background-color 0.3s, cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Interactive states represented through pure contrast pulse rather than color */
    .status-dot.active {
      background: var(--pure-white);
      animation: luxuryPulse 2.5s infinite ease-in-out;
    }

    @keyframes luxuryPulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    /* Hero Metric Section */
    .hero-display {
      padding: 60px 0;
      text-align: center;
      position: relative;
    }

    .meta-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .candidate-name {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .temperature-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .temperature-value {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 80px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    /* Alert style without using red: Invert style rules for warning emphasis */
    .temperature-value.fever-alert {
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 8px;
      text-decoration-thickness: 2px;
    }

    .temperature-unit {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 200;
      vertical-align: super;
      margin-left: 4px;
      letter-spacing: 0em;
    }

    .timestamp-ticker {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* Architectural Log Section */
    .log-section {
      border-top: 1px solid var(--border);
      padding-top: 30px;
    }

    .log-title-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .log-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .clock-display {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    ul#logList {
      list-style: none;
    }

    ul#logList li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
      animation: fadeInRow 0.5s ease-out forwards;
    }

    @keyframes fadeInRow {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ul#logList li:last-child {
      border-bottom: none;
    }

    .log-identity {
      font-weight: 400;
      letter-spacing: 0.02em;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* High status logic item represented natively via bold mono weight */
    .log-identity.fever-log {
      font-weight: 600;
    }

    .log-identity.fever-log::after {
      content: ' / CRITICAL';
      font-size: 9px;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-left: 6px;
    }

    .log-metrics {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .log-temp {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
    }

    .log-time {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .empty-state {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>

<body>

  <main>
    <div class="header">
      <div class="brand">Thermal Monitor</div>
      <div class="status-wrapper">
        <span class="status-text" id="statusText">Connecting</span>
        <span class="status-dot" id="liveDot"></span>
      </div>
    </div>

    <div class="hero-display">
      <div class="candidate-name" id="candidateName">—</div>

      <div class="temperature-container">
        <span id="tempValue" class="temperature-value">--.-<span class="temperature-unit">°C</span></span>
      </div>

      <div class="timestamp-ticker" id="lastUpdated">System Idle</div>
    </div>

    <div class="log-section">
      <div class="log-title-bar">
        <div class="log-title">Latest Update Time</div>
        <div class="clock-display" id="clock">--:--:--</div>
      </div>
      <ul id="logList">
        <li class="empty-state" id="emptyState">Awaiting transmission payload...</li>
      </ul>
    </div>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const MQTT_WS_URL = 'ws://broker.benax.rw:9001';
    const MQTT_TOPIC = 'exam/uwase_utuje_sandrine/+';
    const MQTT_USERNAME = '';
    const MQTT_PASSWORD = '';
    const FEVER_THRESHOLD_C = 37.5;
    const MAX_LOG_ROWS = 5;

    const els = {
      liveDot: document.getElementById('liveDot'),
      statusText: document.getElementById('statusText'),
      clock: document.getElementById('clock'),
      candidateName: document.getElementById('candidateName'),
      tempValue: document.getElementById('tempValue'),
      lastUpdated: document.getElementById('lastUpdated'),
      logList: document.getElementById('logList'),
      emptyState: document.getElementById('emptyState')
    };

    let lastReadingAt = null;

    function fmtClock(date) {
      return date.toLocaleTimeString([], { hour12: false });
    }

    function tick() {
      els.clock.textContent = fmtClock(new Date());
      if (lastReadingAt) {
        const secs = Math.round((Date.now() - lastReadingAt) / 1000);
        els.lastUpdated.textContent = secs < 2 ? 'Updated just now' : `Updated ${secs}s ago`;
      }
    }
    setInterval(tick, 1000);
    tick();

    function setConnectionState(connected) {
      if (connected) {
        els.liveDot.classList.add('active');
        els.statusText.textContent = 'System Live';
      } else {
        els.liveDot.classList.remove('active');
        els.statusText.textContent = 'Reconnecting';
      }
    }

    function addLogRow(candidate, temperature, isFever, time) {
      if (els.emptyState) {
        els.emptyState.remove();
        els.emptyState = null;
      }

      const li = document.createElement('li');

      const nameSpan = document.createElement('span');
      nameSpan.className = 'log-identity' + (isFever ? ' fever-log' : '');
      nameSpan.textContent = candidate;

      const metricDiv = document.createElement('div');
      metricDiv.className = 'log-metrics';

      const tempSpan = document.createElement('span');
      tempSpan.className = 'log-temp';
      tempSpan.textContent = `${temperature.toFixed(1)}°C`;

      const timeSpan = document.createElement('span');
      timeSpan.className = 'log-time';
      timeSpan.textContent = time;

      metricDiv.append(tempSpan, timeSpan);
      li.append(nameSpan, metricDiv);

      els.logList.prepend(li);

      while (els.logList.children.length > MAX_LOG_ROWS) {
        els.logList.removeChild(els.logList.lastChild);
      }
    }

    function handleReading(data) {
      const candidate = String(data.candidate);
      const temperature = Number(data.temperature);
      if (!candidate || Number.isNaN(temperature)) return;

      const isFever = temperature >= FEVER_THRESHOLD_C;

      if (isFever) {
        els.tempValue.className = "temperature-value fever-alert";
      } else {
        els.tempValue.className = "temperature-value";
      }

      els.candidateName.textContent = candidate;
      els.tempValue.innerHTML = `${temperature.toFixed(1)}<span class="temperature-unit">°C</span>`;

      lastReadingAt = Date.now();
      tick();

      addLogRow(candidate, temperature, isFever, fmtClock(new Date()));
    }

    const client = mqtt.connect(MQTT_WS_URL, {
      username: MQTT_USERNAME || undefined,
      password: MQTT_PASSWORD || undefined,
      reconnectPeriod: 2000,
    });

    client.on('connect', () => {
      setConnectionState(true);
      client.subscribe(MQTT_TOPIC);
    });
    client.on('reconnect', () => setConnectionState(false));
    client.on('close', () => setConnectionState(false));
    client.on('error', () => setConnectionState(false));

    client.on('message', (_topic, payload) => {
      try {
        const data = JSON.parse(payload.toString());
        handleReading(data);
      } catch (e) {
        console.warn('Could not parse MQTT payload:', e);
      }
    });
  </script>

</body>

</html>
